<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CCC Fleet Dashboard</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #0d1117;
  color: #c9d1d9;
  font-family: ui-monospace, SFMono-Regular, 'SF Mono', Menlo, Consolas, 'Liberation Mono', monospace;
  font-size: 16px;
  line-height: 1.5;
  min-height: 100vh;
}

/* Disconnected banner */
#banner {
  display: none;
  background: #f85149;
  color: #fff;
  text-align: center;
  padding: 8px 16px;
  font-size: 14px;
  position: sticky;
  top: 0;
  z-index: 100;
}
#banner.show { display: block; }

/* Header */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 24px;
  background: #161b22;
  border-bottom: 1px solid #30363d;
}
.header h1 { font-size: 22px; font-weight: 600; }
.header .refresh-info { font-size: 13px; color: #8b949e; }
.header .refresh-dot {
  display: inline-block;
  width: 8px; height: 8px;
  border-radius: 50%;
  background: #3fb950;
  margin-right: 6px;
  animation: pulse 2s infinite;
}
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

/* Task submission form */
.task-form {
  padding: 16px 24px;
  background: #161b22;
  border-bottom: 1px solid #30363d;
}
.task-form form { display: flex; gap: 8px; }
.task-form input[type="text"] {
  flex: 1;
  background: #0d1117;
  border: 1px solid #30363d;
  color: #c9d1d9;
  padding: 10px 14px;
  border-radius: 6px;
  font-family: inherit;
  font-size: 14px;
}
.task-form input[type="text"]::placeholder { color: #8b949e; }
.task-form button {
  background: #238636;
  color: #fff;
  border: none;
  padding: 10px 20px;
  border-radius: 6px;
  font-family: inherit;
  font-size: 14px;
  cursor: pointer;
  font-weight: 600;
}
.task-form button:hover { background: #2ea043; }
.task-form button:disabled { opacity: 0.5; cursor: not-allowed; }
.task-form .form-msg { font-size: 12px; margin-top: 6px; min-height: 18px; }

/* Fleet Summary Bar */
.fleet-bar {
  display: flex;
  gap: 16px;
  padding: 14px 24px;
  background: #161b22;
  border-bottom: 1px solid #30363d;
  flex-wrap: wrap;
}
.fleet-stat {
  display: flex;
  flex-direction: column;
  align-items: center;
  min-width: 100px;
}
.fleet-stat .value { font-size: 28px; font-weight: 700; color: #3fb950; }
.fleet-stat .value.yellow { color: #d29922; }
.fleet-stat .value.red { color: #f85149; }
.fleet-stat .value.blue { color: #58a6ff; }
.fleet-stat .label { font-size: 11px; color: #8b949e; text-transform: uppercase; letter-spacing: 0.5px; }

/* Worker Cards Grid */
.section { padding: 20px 24px; }
.section h2 { font-size: 18px; font-weight: 600; margin-bottom: 14px; }
.workers-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
  gap: 16px;
}
.worker-card {
  background: #161b22;
  border: 1px solid #30363d;
  border-radius: 10px;
  padding: 16px;
  transition: border-color 0.3s, box-shadow 0.3s;
}
.worker-card.card-pulse {
  border-color: #58a6ff;
  box-shadow: 0 0 8px rgba(88, 166, 255, 0.3);
}
.worker-card.stale { opacity: 0.5; }
.worker-header {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 10px;
}
.status-dot {
  width: 12px; height: 12px;
  border-radius: 50%;
  flex-shrink: 0;
}
.dot-idle { background: #3fb950; }
.dot-busy { background: #d29922; }
.dot-unreachable { background: #f85149; }
.worker-name { font-size: 17px; font-weight: 600; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.phase-badge {
  font-size: 11px;
  padding: 2px 8px;
  border-radius: 4px;
  font-weight: 600;
  text-transform: uppercase;
}

.card-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 3px 0;
  font-size: 13px;
}
.card-row .rlabel { color: #8b949e; }
.card-row .rvalue { font-weight: 500; }
.card-task {
  font-size: 13px;
  color: #c9d1d9;
  padding: 8px 0 0;
  border-top: 1px solid #30363d;
  margin-top: 8px;
  word-break: break-word;
}

/* Gauge bars */
.gauge { height: 8px; background: #21262d; border-radius: 4px; overflow: hidden; margin: 3px 0 6px; }
.gauge .gfill { height: 100%; border-radius: 4px; transition: width 0.5s; }
.gfill-green { background: #3fb950; }
.gfill-yellow { background: #d29922; }
.gfill-red { background: #f85149; }

/* Progress bar */
.progress-bar { height: 6px; background: #21262d; border-radius: 3px; overflow: hidden; margin: 4px 0; }
.progress-bar .pfill { height: 100%; background: #58a6ff; border-radius: 3px; transition: width 0.5s; }

/* Tasks table */
.tasks-table { width: 100%; border-collapse: collapse; font-size: 14px; }
.tasks-table th {
  text-align: left;
  padding: 10px 12px;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: #8b949e;
  border-bottom: 2px solid #30363d;
}
.tasks-table td {
  padding: 10px 12px;
  border-bottom: 1px solid #21262d;
}
.tasks-table tr:hover { background: rgba(88, 166, 255, 0.04); }
.badge {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 4px;
  font-size: 11px;
  font-weight: 600;
}
.badge-completed { background: rgba(63, 185, 80, 0.15); color: #3fb950; }
.badge-failed { background: rgba(248, 81, 73, 0.15); color: #f85149; }
.badge-dispatched { background: rgba(88, 166, 255, 0.15); color: #58a6ff; }
.badge-pending { background: rgba(139, 148, 158, 0.15); color: #8b949e; }

.empty-msg { text-align: center; padding: 30px; color: #8b949e; font-size: 14px; }

footer { padding: 12px 24px; text-align: center; font-size: 12px; color: #484f58; }

/* Responsive */
@media (max-width: 600px) {
  .header, .task-form, .fleet-bar, .section, footer { padding-left: 12px; padding-right: 12px; }
  .workers-grid { grid-template-columns: 1fr; }
  .fleet-stat { min-width: 70px; }
  .fleet-stat .value { font-size: 22px; }
  .task-form form { flex-direction: column; }
}
</style>
</head>
<body>

<div id="banner">Disconnected -- last update: <span id="banner-time">--</span></div>

<div class="header">
  <h1>CCC Fleet Dashboard</h1>
  <div class="refresh-info"><span class="refresh-dot"></span>Auto-refresh <span id="countdown">15</span>s</div>
</div>

<div class="task-form">
  <form id="submit-form">
    <input type="text" id="task-input" placeholder="Submit a task to the fleet..." autocomplete="off">
    <button type="submit" id="task-btn">Submit</button>
  </form>
  <div class="form-msg" id="form-msg"></div>
</div>

<div class="fleet-bar" id="fleet-bar">
  <div class="fleet-stat"><span class="value" id="stat-workers">--</span><span class="label">Workers</span></div>
  <div class="fleet-stat"><span class="value" id="stat-idle">--</span><span class="label">Idle</span></div>
  <div class="fleet-stat"><span class="value yellow" id="stat-busy">--</span><span class="label">Busy</span></div>
  <div class="fleet-stat"><span class="value red" id="stat-unreachable">--</span><span class="label">Unreachable</span></div>
  <div class="fleet-stat"><span class="value" id="stat-done-today">--</span><span class="label">Done Today</span></div>
  <div class="fleet-stat"><span class="value red" id="stat-failed">--</span><span class="label">Failed</span></div>
  <div class="fleet-stat"><span class="value blue" id="stat-avg-dur">--</span><span class="label">Avg Duration</span></div>
</div>

<div class="section">
  <h2>Workers</h2>
  <div class="workers-grid" id="workers-grid">
    <div class="empty-msg">Loading workers...</div>
  </div>
</div>

<div class="section">
  <h2>Recent Tasks</h2>
  <table class="tasks-table">
    <thead>
      <tr><th>Task</th><th>Worker</th><th>Status</th><th>Duration</th><th>Time</th></tr>
    </thead>
    <tbody id="tasks-body">
      <tr><td colspan="5" class="empty-msg">Loading...</td></tr>
    </tbody>
  </table>
</div>

<footer>CCC Fleet Monitoring</footer>

<script>
(function() {
  var params = new URLSearchParams(location.search);
  var REFRESH_S = Math.max(5, parseInt(params.get('refresh') || '15', 10));
  var REFRESH = REFRESH_S * 1000;
  var STALE_THRESHOLD = 90;

  var timer = null;
  var backoff = REFRESH;
  var lastSuccess = null;
  var prevWorkerJSON = {};
  var countdown = REFRESH_S;

  var countdownEl = document.getElementById('countdown');
  setInterval(function() {
    countdown--;
    if (countdown < 0) countdown = 0;
    countdownEl.textContent = countdown;
  }, 1000);

  function esc(s) { var d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }

  function fmtDur(s) {
    if (s == null || s < 0) return '--';
    s = Math.floor(s);
    if (s < 60) return s + 's';
    if (s < 3600) return Math.floor(s / 60) + 'm ' + (s % 60) + 's';
    return Math.floor(s / 3600) + 'h ' + Math.floor((s % 3600) / 60) + 'm';
  }

  function timeAgo(ts) {
    if (!ts) return '--';
    var d = (Date.now() - new Date(ts).getTime()) / 1000;
    if (d < 0) d = 0;
    if (d < 60) return Math.floor(d) + 's ago';
    if (d < 3600) return Math.floor(d / 60) + 'm ago';
    if (d < 86400) return Math.floor(d / 3600) + 'h ago';
    return Math.floor(d / 86400) + 'd ago';
  }

  function gaugeClass(pct) {
    if (pct >= 80) return 'gfill-red';
    if (pct >= 60) return 'gfill-yellow';
    return 'gfill-green';
  }

  function workerStatus(w) {
    if (!w.last_heartbeat) return 'unreachable';
    var age = (Date.now() - new Date(w.last_heartbeat).getTime()) / 1000;
    if (age > STALE_THRESHOLD) return 'unreachable';
    return w.status || 'idle';
  }

  function dotClass(s) {
    if (s === 'idle') return 'dot-idle';
    if (s === 'busy' || s === 'maintenance') return 'dot-busy';
    return 'dot-unreachable';
  }

  function statusColor(s) {
    if (s === 'idle') return '#3fb950';
    if (s === 'busy' || s === 'maintenance') return '#d29922';
    return '#f85149';
  }

  function phaseBadge(phase) {
    if (!phase || phase === 'idle' || phase === 'unknown') return '';
    var colors = {
      WHY:'#58a6ff',RESEARCH:'#58a6ff',REVIEW:'#d29922',PLAN:'#d29922',
      TESTS:'#db6d28',IMPLEMENT:'#3fb950',BUILD:'#3fb950',VERIFY:'#3fb950',PR:'#3fb950'
    };
    var c = colors[phase] || '#8b949e';
    return '<span class="phase-badge" style="background:' + c + '22;color:' + c + '">' + esc(phase) + '</span>';
  }

  function showBanner(show) {
    var b = document.getElementById('banner');
    if (show) { b.classList.add('show'); document.getElementById('banner-time').textContent = lastSuccess || '--'; }
    else { b.classList.remove('show'); }
  }

  function renderSummary(stats, workers) {
    var wkeys = Object.keys(workers);
    var idle = 0, busy = 0, unreach = 0;
    for (var i = 0; i < wkeys.length; i++) {
      var s = workerStatus(workers[wkeys[i]]);
      if (s === 'idle') idle++;
      else if (s === 'unreachable') unreach++;
      else busy++;
    }
    document.getElementById('stat-workers').textContent = stats.total_workers || wkeys.length;
    document.getElementById('stat-idle').textContent = idle;
    document.getElementById('stat-busy').textContent = busy;
    document.getElementById('stat-unreachable').textContent = unreach;
    document.getElementById('stat-done-today').textContent = stats.tasks_completed_today || 0;
    document.getElementById('stat-failed').textContent = stats.tasks_failed_today || 0;
    document.getElementById('stat-avg-dur').textContent = stats.avg_duration_seconds ? fmtDur(stats.avg_duration_seconds) : '--';
  }

  function cardRow(label, value) {
    return '<div class="card-row"><span class="rlabel">' + label + '</span><span class="rvalue">' + value + '</span></div>';
  }

  function renderWorkers(workers) {
    var grid = document.getElementById('workers-grid');
    var keys = Object.keys(workers).sort(function(a, b) {
      var sa = workerStatus(workers[a]) === 'unreachable' ? 0 : 1;
      var sb = workerStatus(workers[b]) === 'unreachable' ? 0 : 1;
      if (sa !== sb) return sa - sb;
      return a.localeCompare(b);
    });

    if (keys.length === 0) {
      grid.innerHTML = '<div class="empty-msg">No workers registered</div>';
      return;
    }

    var html = '';
    for (var i = 0; i < keys.length; i++) {
      var wid = keys[i];
      var w = workers[wid];
      var status = workerStatus(w);
      var wjson = JSON.stringify(w);
      var changed = prevWorkerJSON[wid] && prevWorkerJSON[wid] !== wjson;
      prevWorkerJSON[wid] = wjson;

      var task = w.task || {};
      var taskDesc = task.description || w.last_task || '';
      if (taskDesc.length > 80) taskDesc = taskDesc.slice(0, 80) + '...';
      var pipeline = w.pipeline || {};
      var phase = pipeline.stage || '';
      var completions = w.completions || w.tasks_completed || 0;
      var stagesComplete = pipeline.stages_complete || 0;
      var progressPct = Math.min(100, Math.round((stagesComplete / 8) * 100));

      html += '<div class="worker-card' + (changed ? ' card-pulse' : '') + (status === 'unreachable' ? ' stale' : '') + '">';
      html += '<div class="worker-header">';
      html += '<span class="status-dot ' + dotClass(status) + '"></span>';
      html += '<span class="worker-name">' + esc(wid) + '</span>';
      html += phaseBadge(phase);
      html += '</div>';

      html += cardRow('Status', '<span style="color:' + statusColor(status) + '">' + status + '</span>');
      html += cardRow('Completions', completions);
      html += cardRow('Heartbeat', timeAgo(w.last_heartbeat));
      html += cardRow('Uptime', fmtDur(w.uptime_seconds));

      if (status === 'busy' && stagesComplete > 0) {
        html += cardRow('Progress', progressPct + '%');
        html += '<div class="progress-bar"><div class="pfill" style="width:' + progressPct + '%"></div></div>';
      }

      if (typeof w.cpu_percent === 'number') {
        html += cardRow('CPU', w.cpu_percent.toFixed(1) + '%');
        html += '<div class="gauge"><div class="gfill ' + gaugeClass(w.cpu_percent) + '" style="width:' + Math.min(w.cpu_percent, 100) + '%"></div></div>';
      }
      if (typeof w.memory_percent === 'number') {
        var memD = w.memory_mb ? ' (' + w.memory_mb.used + '/' + w.memory_mb.total + ' MB)' : '';
        html += cardRow('Memory', w.memory_percent.toFixed(1) + '%' + memD);
        html += '<div class="gauge"><div class="gfill ' + gaugeClass(w.memory_percent) + '" style="width:' + Math.min(w.memory_percent, 100) + '%"></div></div>';
      }
      if (typeof w.disk_percent === 'number') {
        var diskD = w.disk_gb ? ' (' + w.disk_gb.used + '/' + w.disk_gb.total + ' GB)' : '';
        html += cardRow('Disk', w.disk_percent.toFixed(1) + '%' + diskD);
        html += '<div class="gauge"><div class="gfill ' + gaugeClass(w.disk_percent) + '" style="width:' + Math.min(w.disk_percent, 100) + '%"></div></div>';
      }

      if (w.error_count > 0) html += cardRow('Errors', '<span style="color:#f85149">' + w.error_count + '</span>');
      if (taskDesc) html += '<div class="card-task">' + esc(taskDesc) + '</div>';
      html += '</div>';
    }
    grid.innerHTML = html;

    setTimeout(function() {
      var cards = grid.querySelectorAll('.card-pulse');
      for (var c = 0; c < cards.length; c++) cards[c].classList.remove('card-pulse');
    }, 1500);
  }

  function renderTasks(tasks) {
    var body = document.getElementById('tasks-body');
    if (!tasks || tasks.length === 0) {
      body.innerHTML = '<tr><td colspan="5" class="empty-msg">No tasks yet</td></tr>';
      return;
    }
    var order = { dispatched: 0, pending: 1, completed: 2, failed: 3 };
    tasks.sort(function(a, b) {
      var oa = order[a.state] != null ? order[a.state] : 4;
      var ob = order[b.state] != null ? order[b.state] : 4;
      if (oa !== ob) return oa - ob;
      return (b.completed_at || b.dispatched_at || '').localeCompare(a.completed_at || a.dispatched_at || '');
    });
    var show = tasks.slice(0, 25);
    var html = '';
    for (var i = 0; i < show.length; i++) {
      var t = show[i];
      var text = t.text || t.id || '--';
      if (text.length > 80) text = text.slice(0, 80) + '...';
      html += '<tr>';
      html += '<td>' + esc(text) + '</td>';
      html += '<td>' + esc(t.worker || '--') + '</td>';
      html += '<td><span class="badge badge-' + (t.state || 'pending') + '">' + esc(t.state || 'unknown') + '</span></td>';
      html += '<td>' + (t.duration_seconds != null ? fmtDur(t.duration_seconds) : '--') + '</td>';
      html += '<td>' + timeAgo(t.completed_at || t.dispatched_at) + '</td>';
      html += '</tr>';
    }
    body.innerHTML = html;
  }

  function refresh() {
    countdown = REFRESH_S;
    var p1 = fetch('/api/workers').then(function(r) { return r.json(); }).catch(function() { return null; });
    var p2 = fetch('/api/stats').then(function(r) { return r.json(); }).catch(function() { return null; });
    var p3 = fetch('/api/tasks').then(function(r) { return r.json(); }).catch(function() { return null; });

    Promise.all([p1, p2, p3]).then(function(res) {
      if (res[0] === null && res[1] === null && res[2] === null) {
        showBanner(true);
        backoff = Math.min(backoff * 2, 60000);
        scheduleRefresh();
        return;
      }
      showBanner(false);
      backoff = REFRESH;
      lastSuccess = new Date().toISOString().replace('T', ' ').slice(0, 19);
      if (res[0]) renderWorkers(res[0]);
      if (res[1] && res[0]) renderSummary(res[1], res[0]);
      if (res[2]) renderTasks(Array.isArray(res[2]) ? res[2] : []);
      scheduleRefresh();
    });
  }

  function scheduleRefresh() {
    if (timer) clearTimeout(timer);
    timer = setTimeout(refresh, backoff);
  }

  document.addEventListener('visibilitychange', function() {
    if (document.hidden) { if (timer) { clearTimeout(timer); timer = null; } }
    else { refresh(); }
  });

  // Task submission
  document.getElementById('submit-form').addEventListener('submit', function(e) {
    e.preventDefault();
    var input = document.getElementById('task-input');
    var btn = document.getElementById('task-btn');
    var msg = document.getElementById('form-msg');
    var text = input.value.trim();
    if (!text) return;
    btn.disabled = true;
    msg.textContent = 'Submitting...';
    msg.style.color = '#8b949e';
    fetch('/task/submit', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text: text, sender: 'dashboard' })
    })
    .then(function(r) { return r.json().then(function(d) { return { ok: r.ok, data: d }; }); })
    .then(function(res) {
      if (res.ok) {
        msg.textContent = 'Submitted: ' + (res.data.id || 'ok');
        msg.style.color = '#3fb950';
        input.value = '';
        setTimeout(refresh, 1000);
      } else {
        msg.textContent = 'Error: ' + (res.data.error || 'unknown');
        msg.style.color = '#f85149';
      }
      btn.disabled = false;
    })
    .catch(function(err) {
      msg.textContent = 'Failed: ' + err.message;
      msg.style.color = '#f85149';
      btn.disabled = false;
    });
  });

  refresh();
})();
</script>
</body>
</html>
