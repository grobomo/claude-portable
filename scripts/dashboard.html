<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CCC Fleet Dashboard</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #0d1117;
  color: #e6edf3;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  font-size: 16px;
  line-height: 1.5;
}

/* Header */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 24px;
  background: #161b22;
  border-bottom: 1px solid #30363d;
}
.header h1 { font-size: 22px; font-weight: 600; }
.refresh-info { font-size: 13px; color: #8b949e; }
.refresh-dot {
  display: inline-block;
  width: 8px; height: 8px;
  border-radius: 50%;
  background: #3fb950;
  margin-right: 6px;
  animation: pulse 2s infinite;
}
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

/* Fleet Stats Bar */
.stats-bar {
  display: flex;
  gap: 24px;
  padding: 16px 24px;
  background: #161b22;
  border-bottom: 1px solid #30363d;
  flex-wrap: wrap;
}
.stat {
  display: flex;
  flex-direction: column;
  align-items: center;
  min-width: 110px;
}
.stat .val { font-size: 32px; font-weight: 700; color: #3fb950; }
.stat .lbl { font-size: 11px; color: #8b949e; text-transform: uppercase; letter-spacing: 0.8px; }

/* Sections */
.section { padding: 20px 24px; }
.section-title {
  font-size: 16px;
  font-weight: 600;
  margin-bottom: 14px;
  color: #8b949e;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

/* Worker Grid */
.workers-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 12px;
  margin-bottom: 24px;
}
.worker-card {
  background: #161b22;
  border: 1px solid #30363d;
  border-radius: 8px;
  padding: 16px;
  text-align: center;
  transition: border-color 0.2s, transform 0.2s;
}
.worker-card:hover { border-color: #58a6ff; transform: translateY(-2px); }
.worker-card .name { font-size: 15px; font-weight: 600; margin-bottom: 8px; }
.worker-card .state {
  display: inline-block;
  padding: 4px 14px;
  border-radius: 20px;
  font-size: 13px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.worker-card .meta {
  font-size: 12px;
  color: #8b949e;
  margin-top: 8px;
}

/* Worker state colors */
.state-idle { background: #0d4429; color: #3fb950; border: 1px solid #238636; }
.state-busy { background: #4a3000; color: #d29922; border: 1px solid #9e6a03; }
.state-stopping { background: #490202; color: #f85149; border: 1px solid #da3633; }
.state-unreachable { background: #21262d; color: #8b949e; border: 1px solid #30363d; }
.state-maintenance { background: #1c1233; color: #a371f7; border: 1px solid #6e40c9; }

/* Card border glow by state */
.card-idle { border-left: 3px solid #3fb950; }
.card-busy { border-left: 3px solid #d29922; }
.card-stopping { border-left: 3px solid #f85149; }
.card-unreachable { border-left: 3px solid #484f58; }
.card-maintenance { border-left: 3px solid #a371f7; }

/* Submit Form */
.submit-form {
  display: flex;
  gap: 10px;
  margin-bottom: 20px;
}
.submit-form input[type="text"] {
  flex: 1;
  padding: 10px 14px;
  font-size: 15px;
  background: #0d1117;
  border: 1px solid #30363d;
  border-radius: 6px;
  color: #e6edf3;
  outline: none;
}
.submit-form input[type="text"]:focus { border-color: #58a6ff; }
.submit-form input[type="text"]::placeholder { color: #484f58; }
.submit-form button {
  padding: 10px 24px;
  font-size: 15px;
  font-weight: 600;
  background: #238636;
  color: #fff;
  border: 1px solid #2ea043;
  border-radius: 6px;
  cursor: pointer;
  white-space: nowrap;
}
.submit-form button:hover { background: #2ea043; }
.submit-form button:disabled { opacity: 0.5; cursor: not-allowed; }
.submit-msg {
  font-size: 13px;
  margin-bottom: 12px;
  min-height: 20px;
}
.submit-msg.ok { color: #3fb950; }
.submit-msg.err { color: #f85149; }

/* Tasks Table */
.tasks-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 15px;
}
.tasks-table th {
  text-align: left;
  padding: 10px 12px;
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: #8b949e;
  border-bottom: 1px solid #30363d;
  position: sticky;
  top: 0;
  background: #0d1117;
}
.tasks-table td {
  padding: 10px 12px;
  border-bottom: 1px solid #21262d;
  vertical-align: middle;
}
.tasks-table tr:hover { background: #161b22; }

/* Status Badges */
.badge {
  display: inline-block;
  padding: 3px 10px;
  border-radius: 12px;
  font-size: 12px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.3px;
}
.badge-completed { background: #0d4429; color: #3fb950; }
.badge-dispatched { background: #4a3000; color: #d29922; }
.badge-failed { background: #490202; color: #f85149; }
.badge-pending { background: #21262d; color: #8b949e; }

.desc-cell { max-width: 400px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.mono { font-family: 'Consolas', 'Monaco', 'Courier New', monospace; font-size: 13px; }

/* Loading / Error */
.status-msg { text-align: center; padding: 30px; color: #8b949e; font-size: 15px; }
.error-msg { color: #f85149; }

/* Scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: #0d1117; }
::-webkit-scrollbar-thumb { background: #30363d; border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: #58a6ff; }
</style>
</head>
<body>

<div class="header">
  <h1>CCC Fleet Dashboard</h1>
  <div class="refresh-info"><span class="refresh-dot"></span>Auto-refresh <span id="countdown">10</span>s</div>
</div>

<!-- Fleet Stats -->
<div class="stats-bar" id="stats-bar">
  <div class="stat"><span class="val" id="s-workers">--</span><span class="lbl">Workers</span></div>
  <div class="stat"><span class="val" id="s-idle">--</span><span class="lbl">Idle</span></div>
  <div class="stat"><span class="val" id="s-busy">--</span><span class="lbl">Busy</span></div>
  <div class="stat"><span class="val" id="s-completed">--</span><span class="lbl">Completed Today</span></div>
  <div class="stat"><span class="val" id="s-failed">--</span><span class="lbl">Failed Today</span></div>
  <div class="stat"><span class="val" id="s-rate">--</span><span class="lbl">Success Rate</span></div>
  <div class="stat"><span class="val" id="s-avg">--</span><span class="lbl">Avg Duration</span></div>
  <div class="stat"><span class="val" id="s-uptime">--</span><span class="lbl">Uptime</span></div>
</div>

<!-- Workers -->
<div class="section">
  <div class="section-title">Workers</div>
  <div class="workers-grid" id="workers-grid">
    <div class="status-msg">Loading...</div>
  </div>
</div>

<!-- Task Submission + Task List -->
<div class="section">
  <div class="section-title">Submit Task</div>
  <form class="submit-form" id="submit-form">
    <input type="text" id="task-input" placeholder="Describe the task..." autocomplete="off" />
    <button type="submit" id="submit-btn">Submit</button>
  </form>
  <div class="submit-msg" id="submit-msg"></div>

  <div class="section-title">Recent Tasks</div>
  <table class="tasks-table">
    <thead>
      <tr>
        <th>Status</th>
        <th>ID</th>
        <th>Description</th>
        <th>Worker</th>
        <th>Duration</th>
        <th>Time</th>
      </tr>
    </thead>
    <tbody id="tasks-body">
      <tr><td colspan="6" class="status-msg">Loading...</td></tr>
    </tbody>
  </table>
</div>

<script>
(function() {
  var REFRESH = 10;
  var countdown = REFRESH;
  var countdownEl = document.getElementById('countdown');

  // -- Countdown --
  setInterval(function() {
    countdown--;
    if (countdown <= 0) countdown = REFRESH;
    countdownEl.textContent = countdown;
  }, 1000);

  // -- Helpers --
  function esc(s) {
    var d = document.createElement('div');
    d.textContent = s || '';
    return d.innerHTML;
  }

  function fmtDur(sec) {
    if (sec == null) return '--';
    var s = Math.floor(sec);
    if (s < 60) return s + 's';
    if (s < 3600) return Math.floor(s / 60) + 'm ' + (s % 60) + 's';
    var h = Math.floor(s / 3600);
    return h + 'h ' + Math.floor((s % 3600) / 60) + 'm';
  }

  function timeAgo(ts) {
    if (!ts) return '--';
    var diff = Math.floor((Date.now() - new Date(ts).getTime()) / 1000);
    if (diff < 0) diff = 0;
    if (diff < 60) return diff + 's ago';
    if (diff < 3600) return Math.floor(diff / 60) + 'm ago';
    if (diff < 86400) return Math.floor(diff / 3600) + 'h ago';
    return Math.floor(diff / 86400) + 'd ago';
  }

  function trunc(s, n) {
    if (!s) return '--';
    return s.length > n ? s.substring(0, n) + '...' : s;
  }

  function badgeCls(state) {
    var s = (state || '').toLowerCase();
    if (s === 'completed') return 'badge-completed';
    if (s === 'dispatched') return 'badge-dispatched';
    if (s === 'failed') return 'badge-failed';
    return 'badge-pending';
  }

  function workerStateCls(status) {
    var s = (status || '').toLowerCase();
    if (s === 'idle') return 'state-idle';
    if (s === 'busy') return 'state-busy';
    if (s === 'stopping') return 'state-stopping';
    if (s === 'maintenance') return 'state-maintenance';
    return 'state-unreachable';
  }

  function workerCardCls(status) {
    var s = (status || '').toLowerCase();
    if (s === 'idle') return 'card-idle';
    if (s === 'busy') return 'card-busy';
    if (s === 'stopping') return 'card-stopping';
    if (s === 'maintenance') return 'card-maintenance';
    return 'card-unreachable';
  }

  var STATE_ORDER = { pending: 0, dispatched: 1, completed: 2, failed: 3 };

  // -- Fetch --
  function fetchJSON(url) {
    return fetch(url).then(function(r) {
      if (!r.ok) throw new Error('HTTP ' + r.status);
      return r.json();
    });
  }

  // -- Render Stats --
  function renderStats(s) {
    document.getElementById('s-workers').textContent = s.total_workers != null ? s.total_workers : '--';
    document.getElementById('s-idle').textContent = s.idle_count != null ? s.idle_count : '--';
    document.getElementById('s-busy').textContent = s.busy_count != null ? s.busy_count : '--';
    document.getElementById('s-completed').textContent = s.tasks_completed_today != null ? s.tasks_completed_today : '--';
    document.getElementById('s-failed').textContent = s.tasks_failed_today != null ? s.tasks_failed_today : '--';
    document.getElementById('s-rate').textContent = s.success_rate_percent != null ? s.success_rate_percent + '%' : '--';
    document.getElementById('s-avg').textContent = s.avg_duration_seconds != null ? fmtDur(s.avg_duration_seconds) : '--';
    document.getElementById('s-uptime').textContent = s.uptime_seconds != null ? fmtDur(s.uptime_seconds) : '--';
  }

  // -- Render Workers --
  function renderWorkers(data) {
    var grid = document.getElementById('workers-grid');
    // data is {worker-id: {status, ...}, ...}
    var ids = Object.keys(data).sort();
    if (ids.length === 0) {
      grid.innerHTML = '<div class="status-msg">No workers registered</div>';
      return;
    }
    var html = '';
    ids.forEach(function(id) {
      var w = data[id];
      var status = w.status || 'unreachable';
      var completions = w.tasks_completed != null ? w.tasks_completed : (w.completions || 0);
      var task = w.current_task_id || w.last_task || null;
      html += '<div class="worker-card ' + workerCardCls(status) + '">'
        + '<div class="name">' + esc(id) + '</div>'
        + '<span class="state ' + workerStateCls(status) + '">' + esc(status) + '</span>'
        + '<div class="meta">'
        + (task ? 'Task: ' + esc(trunc(task, 20)) + '<br>' : '')
        + 'Done: ' + completions
        + (w.last_report ? ' | Last: ' + timeAgo(w.last_report) : '')
        + '</div></div>';
    });
    grid.innerHTML = html;
  }

  // -- Render Tasks --
  function renderTasks(tasks) {
    var tbody = document.getElementById('tasks-body');
    if (!tasks || !tasks.length) {
      tbody.innerHTML = '<tr><td colspan="6" class="status-msg">No tasks</td></tr>';
      return;
    }
    tasks.sort(function(a, b) {
      var sa = STATE_ORDER[(a.state || '').toLowerCase()];
      var sb = STATE_ORDER[(b.state || '').toLowerCase()];
      if (sa == null) sa = 9;
      if (sb == null) sb = 9;
      return sa - sb;
    });
    var html = '';
    tasks.forEach(function(t) {
      var state = (t.state || 'pending').toLowerCase();
      var ts = t.completed_at || t.dispatched_at || null;
      html += '<tr>'
        + '<td><span class="badge ' + badgeCls(state) + '">' + esc(state) + '</span></td>'
        + '<td class="mono">' + esc(trunc(t.id, 12)) + '</td>'
        + '<td class="desc-cell" title="' + esc(t.text) + '">' + esc(trunc(t.text, 70)) + '</td>'
        + '<td>' + esc(t.worker || '--') + '</td>'
        + '<td class="mono">' + fmtDur(t.duration_seconds) + '</td>'
        + '<td>' + timeAgo(ts) + '</td>'
        + '</tr>';
    });
    tbody.innerHTML = html;
  }

  // -- Submit Form --
  var form = document.getElementById('submit-form');
  var input = document.getElementById('task-input');
  var btn = document.getElementById('submit-btn');
  var msgEl = document.getElementById('submit-msg');

  form.addEventListener('submit', function(e) {
    e.preventDefault();
    var text = input.value.trim();
    if (!text) return;
    btn.disabled = true;
    msgEl.textContent = 'Submitting...';
    msgEl.className = 'submit-msg';

    fetch('/api/submit', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text: text })
    })
    .then(function(r) { return r.json().then(function(d) { return { ok: r.ok, data: d }; }); })
    .then(function(res) {
      if (res.ok) {
        msgEl.textContent = 'Task submitted: ' + res.data.id;
        msgEl.className = 'submit-msg ok';
        input.value = '';
        refresh();
      } else {
        msgEl.textContent = 'Error: ' + (res.data.error || 'Unknown');
        msgEl.className = 'submit-msg err';
      }
    })
    .catch(function(err) {
      msgEl.textContent = 'Error: ' + err;
      msgEl.className = 'submit-msg err';
    })
    .finally(function() { btn.disabled = false; });
  });

  // -- Main Refresh --
  function refresh() {
    countdown = REFRESH;

    fetchJSON('/api/stats')
      .then(renderStats)
      .catch(function() { renderStats({}); });

    fetchJSON('/api/workers')
      .then(renderWorkers)
      .catch(function(err) {
        document.getElementById('workers-grid').innerHTML =
          '<div class="status-msg error-msg">Failed: ' + esc(String(err)) + '</div>';
      });

    fetchJSON('/api/tasks')
      .then(function(data) { renderTasks(Array.isArray(data) ? data : []); })
      .catch(function(err) {
        document.getElementById('tasks-body').innerHTML =
          '<tr><td colspan="6" class="status-msg error-msg">Failed: ' + esc(String(err)) + '</td></tr>';
      });
  }

  refresh();
  setInterval(refresh, REFRESH * 1000);
})();
</script>
</body>
</html>
