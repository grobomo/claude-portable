<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Claude Portable</title>
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --border: #30363d;
    --text: #e6edf3;
    --text-dim: #8b949e;
    --accent: #c084fc;
    --accent-dim: #7c3aed;
    --user-bg: #1c2333;
    --claude-bg: #161b22;
    --error: #f85149;
    --success: #3fb950;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }

  /* ── Header ─────────────────────────────────── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    z-index: 10;
  }

  header h1 {
    font-size: 16px;
    font-weight: 600;
    color: var(--accent);
  }

  .status {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: var(--text-dim);
  }

  .status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--text-dim);
    transition: background 0.3s;
  }

  .status-dot.connected { background: var(--success); }
  .status-dot.busy { background: #d29922; animation: pulse 1s infinite; }
  .status-dot.error { background: var(--error); }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .header-actions {
    display: flex;
    gap: 8px;
  }

  .header-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-dim);
    padding: 4px 10px;
    border-radius: 6px;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .header-btn:hover, .header-btn:active {
    border-color: var(--accent);
    color: var(--accent);
  }

  /* ── Messages ───────────────────────────────── */
  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 12px 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    scroll-behavior: smooth;
    -webkit-overflow-scrolling: touch;
  }

  .msg {
    max-width: 92%;
    padding: 10px 14px;
    border-radius: 16px;
    font-size: 14px;
    line-height: 1.5;
    word-wrap: break-word;
    white-space: pre-wrap;
    animation: fadeIn 0.15s ease-out;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(4px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .msg.user {
    align-self: flex-end;
    background: var(--accent-dim);
    color: white;
    border-bottom-right-radius: 4px;
  }

  .msg.claude {
    align-self: flex-start;
    background: var(--claude-bg);
    border: 1px solid var(--border);
    border-bottom-left-radius: 4px;
  }

  .msg.system {
    align-self: center;
    background: transparent;
    color: var(--text-dim);
    font-size: 12px;
    padding: 4px 12px;
    max-width: 100%;
    text-align: center;
  }

  .msg.error {
    align-self: center;
    color: var(--error);
    font-size: 12px;
  }

  .msg.claude code, .msg.claude pre {
    background: rgba(255,255,255,0.06);
    padding: 1px 5px;
    border-radius: 4px;
    font-family: "SF Mono", "Fira Code", monospace;
    font-size: 13px;
  }

  .msg.claude pre {
    display: block;
    padding: 10px 12px;
    margin: 8px 0;
    overflow-x: auto;
    white-space: pre;
    border: 1px solid var(--border);
  }

  .streaming-cursor::after {
    content: "\25AE";
    animation: blink 0.8s infinite;
    color: var(--accent);
    margin-left: 2px;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0; }
  }

  /* ── Input ──────────────────────────────────── */
  .input-area {
    padding: 8px 12px;
    padding-bottom: max(8px, env(safe-area-inset-bottom));
    background: var(--surface);
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }

  .input-row {
    display: flex;
    gap: 8px;
    align-items: flex-end;
  }

  #input {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px 14px;
    border-radius: 20px;
    font-size: 15px;
    font-family: inherit;
    resize: none;
    max-height: 120px;
    min-height: 40px;
    line-height: 1.4;
    outline: none;
    transition: border-color 0.2s;
  }

  #input:focus { border-color: var(--accent); }
  #input::placeholder { color: var(--text-dim); }

  #send-btn {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: var(--accent-dim);
    border: none;
    color: white;
    font-size: 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: background 0.2s, transform 0.1s;
  }

  #send-btn:active { transform: scale(0.92); }
  #send-btn:disabled { opacity: 0.4; }
  #send-btn.stop { background: var(--error); }

  /* ── Project picker (hidden by default) ─────── */
  .project-bar {
    display: none;
    padding: 6px 16px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    font-size: 12px;
    color: var(--text-dim);
  }

  .project-bar.visible { display: flex; align-items: center; gap: 8px; }

  .project-bar input {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 4px 8px;
    border-radius: 4px;
    font-size: 12px;
    font-family: monospace;
  }

  /* ── Scrollbar ──────────────────────────────── */
  #messages::-webkit-scrollbar { width: 4px; }
  #messages::-webkit-scrollbar-track { background: transparent; }
  #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* ── Wide screens ───────────────────────────── */
  @media (min-width: 768px) {
    #messages { padding: 20px 10%; }
    .msg { max-width: 75%; font-size: 15px; }
  }
</style>
</head>
<body>

<header>
  <div>
    <h1>Claude Portable</h1>
    <div class="status">
      <span class="status-dot" id="status-dot"></span>
      <span id="status-text">Connecting...</span>
    </div>
  </div>
  <div class="header-actions">
    <button class="header-btn" onclick="toggleProject()">cwd</button>
    <button class="header-btn" onclick="sendResume()">resume</button>
  </div>
</header>

<div class="project-bar" id="project-bar">
  <span>cwd:</span>
  <input type="text" id="project-path" value="/workspace" onchange="changeProject(this.value)">
</div>

<div id="messages"></div>

<div class="input-area">
  <div class="input-row">
    <textarea id="input" rows="1" placeholder="Message Claude..." autofocus></textarea>
    <button id="send-btn" onclick="sendOrStop()">&#9654;</button>
  </div>
</div>

<script>
const TOKEN = "__WEB_TOKEN__";
const messagesEl = document.getElementById("messages");
const inputEl = document.getElementById("input");
const sendBtn = document.getElementById("send-btn");
const statusDot = document.getElementById("status-dot");
const statusText = document.getElementById("status-text");

let ws = null;
let isStreaming = false;
let currentClaudeMsg = null;
let reconnectTimer = null;
let reconnectDelay = 1000;

// ── WebSocket connection ──────────────────────

function connect() {
  const proto = location.protocol === "https:" ? "wss:" : "ws:";
  const url = `${proto}//${location.host}?token=${TOKEN}`;

  ws = new WebSocket(url);

  ws.onopen = () => {
    setStatus("connected", "Connected");
    reconnectDelay = 1000;
    if (reconnectTimer) { clearTimeout(reconnectTimer); reconnectTimer = null; }
  };

  ws.onmessage = (e) => {
    const msg = JSON.parse(e.data);
    handleMessage(msg);
  };

  ws.onclose = () => {
    setStatus("error", "Disconnected");
    scheduleReconnect();
  };

  ws.onerror = () => {
    setStatus("error", "Connection error");
  };
}

function scheduleReconnect() {
  if (reconnectTimer) return;
  reconnectTimer = setTimeout(() => {
    reconnectTimer = null;
    connect();
  }, reconnectDelay);
  reconnectDelay = Math.min(reconnectDelay * 1.5, 10000);
}

// ── Message handling ──────────────────────────

function handleMessage(msg) {
  switch (msg.type) {
    case "system":
      addMessage("system", msg.text);
      break;

    case "start":
      isStreaming = true;
      currentClaudeMsg = addMessage("claude", "");
      currentClaudeMsg.classList.add("streaming-cursor");
      setStatus("busy", "Thinking...");
      sendBtn.innerHTML = "&#9632;";
      sendBtn.classList.add("stop");
      break;

    case "stream":
      if (currentClaudeMsg) {
        currentClaudeMsg.textContent += msg.text;
        scrollToBottom();
      }
      break;

    case "stderr":
      // Show stderr as dim system message (tool use info, etc.)
      if (msg.text.trim()) {
        addMessage("system", msg.text.trim());
      }
      break;

    case "done":
      if (currentClaudeMsg) {
        currentClaudeMsg.classList.remove("streaming-cursor");
        // Format code blocks after streaming completes
        formatCodeBlocks(currentClaudeMsg);
      }
      currentClaudeMsg = null;
      isStreaming = false;
      setStatus("connected", "Ready");
      sendBtn.innerHTML = "&#9654;";
      sendBtn.classList.remove("stop");
      break;

    case "error":
      addMessage("error", msg.text);
      isStreaming = false;
      setStatus("error", "Error");
      sendBtn.innerHTML = "&#9654;";
      sendBtn.classList.remove("stop");
      break;
  }
}

function addMessage(type, text) {
  const el = document.createElement("div");
  el.className = `msg ${type}`;
  el.textContent = text;
  messagesEl.appendChild(el);
  scrollToBottom();
  return el;
}

function scrollToBottom() {
  requestAnimationFrame(() => {
    messagesEl.scrollTop = messagesEl.scrollHeight;
  });
}

function formatCodeBlocks(el) {
  // Simple code block formatting for ```...``` blocks
  let html = el.textContent;
  // Escape HTML first
  html = html.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
  // Code blocks
  html = html.replace(/```(\w*)\n([\s\S]*?)```/g, '<pre><code>$2</code></pre>');
  // Inline code
  html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
  // Bold
  html = html.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
  if (html !== el.textContent) {
    el.innerHTML = html;
  }
}

// ── User actions ──────────────────────────────

function sendOrStop() {
  if (isStreaming) {
    ws.send(JSON.stringify({ type: "interrupt" }));
    return;
  }
  sendMessage();
}

function sendMessage() {
  const text = inputEl.value.trim();
  if (!text || !ws || ws.readyState !== WebSocket.OPEN) return;

  addMessage("user", text);
  ws.send(JSON.stringify({ type: "chat", text }));

  inputEl.value = "";
  inputEl.style.height = "auto";
  inputEl.focus();
}

function sendResume() {
  if (!ws || ws.readyState !== WebSocket.OPEN) return;
  addMessage("system", "Resuming last conversation...");
  ws.send(JSON.stringify({ type: "resume" }));
}

function toggleProject() {
  document.getElementById("project-bar").classList.toggle("visible");
}

function changeProject(path) {
  if (!ws || ws.readyState !== WebSocket.OPEN) return;
  ws.send(JSON.stringify({ type: "cd", path }));
}

function setStatus(state, text) {
  statusDot.className = `status-dot ${state}`;
  statusText.textContent = text;
}

// ── Input handling ────────────────────────────

inputEl.addEventListener("keydown", (e) => {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    sendOrStop();
  }
});

// Auto-resize textarea
inputEl.addEventListener("input", () => {
  inputEl.style.height = "auto";
  inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + "px";
});

// ── Init ──────────────────────────────────────

connect();
</script>
</body>
</html>
