services:
  claude:
    build: .
    image: claude-portable:latest
    container_name: claude-portable
    hostname: claude-portable
    environment:
      # Auth: API key (simplest) or OAuth (enterprise)
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      # BWS mode (set BWS_ACCESS_TOKEN to use Bitwarden Secrets Manager)
      - BWS_ACCESS_TOKEN=${BWS_ACCESS_TOKEN:-}
      # OAuth mode (enterprise)
      - CLAUDE_OAUTH_ACCESS_TOKEN=${CLAUDE_OAUTH_ACCESS_TOKEN:-}
      - CLAUDE_OAUTH_REFRESH_TOKEN=${CLAUDE_OAUTH_REFRESH_TOKEN:-}
      - CLAUDE_OAUTH_EXPIRES_AT=${CLAUDE_OAUTH_EXPIRES_AT:-}
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      - V1_API_TOKEN=${V1_API_TOKEN:-}
      - CONFLUENCE_API_TOKEN=${CONFLUENCE_API_TOKEN:-}
      - JIRA_API_TOKEN=${JIRA_API_TOKEN:-}
      - TRELLO_API_TOKEN=${TRELLO_API_TOKEN:-}
      - SSH_PUBLIC_KEY=${SSH_PUBLIC_KEY:-}
      # Container config
      - CLAUDE_PORTABLE_MCP_ORG=${CLAUDE_PORTABLE_MCP_ORG:-}
      - CLAUDE_PORTABLE_MCP_REPOS=${CLAUDE_PORTABLE_MCP_REPOS:-mcp-manager mcp-v1-lite mcp-jira-lite mcp-trend-docs mcp-trendgpt}
      - CLAUDE_PORTABLE_SERVERS=${CLAUDE_PORTABLE_SERVERS:-wiki-lite,v1-lite,jira-lite,trello-lite}
      - CLAUDE_PORTABLE_IDLE_TIMEOUT=${CLAUDE_PORTABLE_IDLE_TIMEOUT:-30}
      - CLAUDE_PORTABLE_STATE_BUCKET=${CLAUDE_PORTABLE_STATE_BUCKET:-}
      - AWS_DEFAULT_REGION=${AWS_DEFAULT_REGION:-us-east-2}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-}
      - CLAUDE_WEB_TOKEN=${CLAUDE_WEB_TOKEN:-}
      - NODE_OPTIONS=--max-old-space-size=4096
    ports:
      - "2222:22"
    volumes:
      # Persistent config survives container restart (not rebuild)
      - claude-config:/home/claude/.claude
      # Persistent MCP repos survive restart
      - claude-mcp:/opt/mcp
      # Persistent session logs -- survives container destroy/rebuild
      - claude-sessions:/data
      # Local workspace bind mount (optional -- uncomment to use)
      # - ./workspace:/workspace
    stdin_open: true
    tty: true
    restart: unless-stopped

volumes:
  claude-config:
  claude-mcp:
  claude-sessions:
