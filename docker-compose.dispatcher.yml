# Override for dispatcher instances (headless, no Chrome).
# Usage: docker compose -f docker-compose.yml -f docker-compose.remote.yml -f docker-compose.dispatcher.yml up -d
services:
  claude:
    environment:
      - DISPATCHER_MODE=true
      - DISPATCHER_CHAT_ID=${DISPATCHER_CHAT_ID:-}
      - DISPATCHER_TRIGGER=${DISPATCHER_TRIGGER:-@claude}
      - DISPATCHER_POLL_INTERVAL=${DISPATCHER_POLL_INTERVAL:-30}
      - DISPATCHER_SECRET_NAME=${DISPATCHER_SECRET_NAME:-claude-portable/graph-token}
      - DISPATCHER_KEY_SYNC_INTERVAL=${DISPATCHER_KEY_SYNC_INTERVAL:-300}
    # Run dispatcher-daemon.sh directly instead of bootstrap.sh
    entrypoint: ["/opt/claude-portable/scripts/dispatcher-daemon.sh"]
    command: []
    ports:
      # SSH only -- no VNC, Chrome DevTools, file browser, or web-chat
      - "2222:22"
