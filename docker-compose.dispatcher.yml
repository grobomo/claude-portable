# Override for dispatcher instances (headless, no Chrome).
# Dispatcher watches TODO.md on git for unclaimed tasks and manages EC2 fleet.
# Teams polling is handled by the chatbot instance, not the dispatcher.
#
# Usage: docker compose -f docker-compose.yml -f docker-compose.remote.yml -f docker-compose.dispatcher.yml up -d
services:
  claude:
    environment:
      - DISPATCHER_MODE=true
      - TODO_POLL_INTERVAL=${TODO_POLL_INTERVAL:-60}
      - DISPATCHER_REPO_DIR=${DISPATCHER_REPO_DIR:-/workspace/claude-portable}
      - DISPATCHER_MAX_WORKERS=${DISPATCHER_MAX_WORKERS:-5}
      - DISPATCHER_HEALTH_PORT=${DISPATCHER_HEALTH_PORT:-8080}
      - DISPATCHER_KEY_SYNC_INTERVAL=${DISPATCHER_KEY_SYNC_INTERVAL:-300}
      - BRAIN_HEALTH_PORT=${BRAIN_HEALTH_PORT:-8081}
      - BRAIN_LOOP_INTERVAL=${BRAIN_LOOP_INTERVAL:-30}
      - BRAIN_MODEL_ID=${BRAIN_MODEL_ID:-us.anthropic.claude-sonnet-4-6-20250514-v1:0}
    # Run dispatcher-daemon.sh directly instead of bootstrap.sh
    entrypoint: ["/opt/claude-portable/scripts/dispatcher-daemon.sh"]
    command: []
    ports:
      # SSH only -- no VNC, Chrome DevTools, file browser, or web-chat
      - "2222:22"
      # Dispatcher brain health endpoint
      - "8081:8081"
