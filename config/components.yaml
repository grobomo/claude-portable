# Claude Portable Component Manifest
# Each component is pulled from its own repo at container startup.
# Edit this file to add/remove/swap components.
#
# Format:
#   - name: component-name
#     repo: github-org/repo-name
#     type: config|skill|mcp|hook|rule
#     target: where files land inside the container
#     enabled: true/false
#     branch: main (optional, defaults to main)
#     sparse: path/inside/repo (optional, for monorepos)
#     visibility: public|private (private needs GITHUB_TOKEN)

# ===========================================================================
# CONFIG DEFAULTS (CLAUDE.md, settings.json, base hooks, base rules)
# ===========================================================================
- name: claude-code-defaults
  repo: grobomo/claude-code-defaults
  type: config
  target: /home/claude/.claude
  enabled: true
  visibility: public
  description: "Base config: CLAUDE.md, settings.json, hooks, rules, credentials helper"

# ===========================================================================
# SKILL MARKETPLACE (published skill plugins)
# ===========================================================================
- name: claude-code-skills
  repo: grobomo/claude-code-skills
  type: skill-marketplace
  target: /home/claude/.claude/skills
  enabled: true
  visibility: public
  description: "Published skills: v1-api, trend-docs, credential-manager, diff-view, etc."

# ===========================================================================
# MCP SERVERS (from mcp-dev monorepo -- use sparse checkout)
# ===========================================================================
- name: mcp-manager
  repo: joel-ginsberg_tmemu/mcp-dev
  type: mcp
  target: /opt/mcp/mcp-manager
  enabled: true
  visibility: private
  sparse: mcp-manager
  description: "Dynamic MCP server proxy router (Node.js)"

- name: mcp-v1-lite
  repo: joel-ginsberg_tmemu/mcp-dev
  type: mcp
  target: /opt/mcp/mcp-v1-lite
  enabled: true
  visibility: private
  sparse: mcp-v1-lite
  description: "Vision One API router (Python, 280+ operations)"

- name: mcp-jira-lite
  repo: joel-ginsberg_tmemu/mcp-dev
  type: mcp
  target: /opt/mcp/mcp-jira-lite
  enabled: true
  visibility: private
  sparse: mcp-jira-lite
  description: "Jira issue management (Python)"

- name: mcp-trend-docs
  repo: joel-ginsberg_tmemu/mcp-dev
  type: mcp
  target: /opt/mcp/mcp-trend-docs
  enabled: true
  visibility: private
  sparse: mcp-trend-docs
  description: "Trend Micro documentation search (Python)"

- name: mcp-trendgpt
  repo: joel-ginsberg_tmemu/mcp-dev
  type: mcp
  target: /opt/mcp/mcp-trendgpt
  enabled: true
  visibility: private
  sparse: mcp-trendgpt
  description: "TrendGPT product knowledge queries (Python)"

