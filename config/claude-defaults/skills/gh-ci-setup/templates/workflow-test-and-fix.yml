name: "{{PROJECT_NAME}} Test & Auto-Fix"

on:
  push:
    branches: [main]
    paths-ignore:
      - 'test-results/**'

jobs:
  test:
    runs-on: self-hosted
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # {{BUILD_STEPS}} - Project-specific build steps inserted here
      # Example for Docker:
      #   - name: Build container
      #     run: docker compose build
      #   - name: Start container
      #     run: docker compose up -d

      - name: Run tests
        id: first_run
        continue-on-error: true
        run: "{{TEST_COMMAND}}"
        # Example: bash scripts/run-tests.sh

      # --- Tests passed: commit results ---
      - name: Commit test results (on success)
        if: steps.first_run.outcome == 'success'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add test-results/
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "test: update test results [skip ci]"
          git push

      # --- Tests failed: Claude auto-fix ---
      - name: Save failure log
        if: steps.first_run.outcome == 'failure'
        run: |
          {
            echo "=== Test Output ==="
            cat test-results/*.log 2>/dev/null || echo "(no logs)"
          } > test-results/failure.log

      - name: Install Claude Code
        if: steps.first_run.outcome == 'failure'
        run: npm install -g @anthropic-ai/claude-code

      - name: Claude auto-fix
        if: steps.first_run.outcome == 'failure'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          claude -p "The test suite failed. Here are the results:

          $(cat test-results/failure.log)

          Fix the issues causing test failures. Make minimal, targeted fixes.
          Do NOT modify the test scripts themselves unless they have actual bugs."

      # {{REBUILD_STEPS}} - Project-specific rebuild after fix
      # Example for Docker:
      #   - name: Rebuild container
      #     run: docker compose down && docker compose build && docker compose up -d

      - name: Re-run tests
        id: second_run
        if: steps.first_run.outcome == 'failure'
        continue-on-error: true
        run: "{{TEST_COMMAND}}"

      - name: Commit auto-fix (on retry success)
        if: steps.first_run.outcome == 'failure' && steps.second_run.outcome == 'success'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "fix: auto-fix test failures via Claude Code [skip ci]"
          git push

      - name: Send failure notification
        if: steps.first_run.outcome == 'failure' && steps.second_run.outcome == 'failure'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_SERVER }}
          server_port: 587
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "{{PROJECT_NAME}} CI Failed - Manual Fix Required"
          to: ${{ secrets.NOTIFY_EMAIL }}
          from: "CI Bot <ci@{{PROJECT_DOMAIN}}>"
          body: |
            Tests failed and Claude auto-fix could not resolve the issues.
            Repository: ${{ github.repository }}
            Commit: ${{ github.sha }}
            Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

      - name: Upload failure artifacts
        if: steps.first_run.outcome == 'failure' && steps.second_run.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: test-failure-logs
          path: test-results/
          retention-days: 14

      - name: Fail workflow if unfixed
        if: steps.first_run.outcome == 'failure' && steps.second_run.outcome == 'failure'
        run: exit 1
