# Claude Portable Component Manifest
# Each component is pulled from its own repo at container startup.
# Edit this file to add/remove/swap components.
#
# Format:
#   - name: component-name
#     repo: github-org/repo-name
#     type: config|skill|mcp|hook|rule
#     target: where files land inside the container
#     enabled: true/false
#     branch: main (optional, defaults to main)
#     sparse: path/inside/repo (optional, for monorepos)
#     visibility: public|private (private needs GITHUB_TOKEN)

# ===========================================================================
# CONFIG DEFAULTS (CLAUDE.md, settings.json, base hooks, base rules)
# ===========================================================================
- name: claude-code-defaults
  repo: grobomo/claude-code-defaults
  type: config
  target: /home/claude/.claude
  enabled: true
  visibility: public
  description: "Base config: settings.json (permissions, model, bypass mode)"

# ===========================================================================
# SKILL MARKETPLACE (published skill plugins)
# ===========================================================================
# - name: claude-code-skills
#   repo: your-org/claude-code-skills
#   type: skill-marketplace
#   target: /home/claude/.claude/skills
#   enabled: false
#   visibility: public
#   description: "Published skills from marketplace"

# ===========================================================================
# MCP SERVERS (add your own MCP servers here)
# ===========================================================================
- name: mcp-manager
  repo: grobomo/mcp-manager
  type: mcp
  target: /opt/mcp/mcp-manager
  enabled: true
  visibility: private
  description: "Central MCP server manager -- registers, proxies, and lifecycles all other MCP servers"

- name: blueprint-extra-mcp
  repo: grobomo/blueprint-extra-mcp
  type: mcp
  target: /opt/mcp/blueprint-extra-mcp
  enabled: true
  visibility: private
  description: "Browser automation via headless Chrome with extensions support"

