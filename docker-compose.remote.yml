# Override for remote deployments (AWS EC2, ESXi VM).
# Usage: docker compose -f docker-compose.yml -f docker-compose.remote.yml up -d
services:
  claude:
    environment:
      - CLAUDE_PORTABLE_MODE=remote
    # No local volume mounts -- everything from git + BWS
    volumes:
      - claude-config:/home/claude/.claude
      - claude-mcp:/opt/mcp
      - claude-sessions:/data
    # Container SSH on 2222 (host port 22 is used by host sshd)
    ports:
      - "2222:22"
      - "127.0.0.1:5900:5900"   # VNC (localhost only -- access via SSH tunnel)
      - "127.0.0.1:9222:9222"   # Chrome DevTools (localhost only)
      - "127.0.0.1:8080:8080"   # File browser (localhost only)
